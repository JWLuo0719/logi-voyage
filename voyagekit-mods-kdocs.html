 *
 * @param {Object} option
 */
function ajax(option) {
    var xmlHttp = false,
        crossdomain = false,
        url = option.url,
        method = option.type.toUpperCase() || 'GET',

        crossdomainREG = new RegExp("^http[s]:\/\/" + location.host);

    if (url.indexOf("http") == 0 && !crossdomainREG.test(url)) {
        crossdomain = true;
    }
    //创建ajax对象 
    if (window.XMLHttpRequest) {
        xmlHttp = new XMLHttpRequest();
    } else if (window.ActiveXObject) { //兼容IE
        try {
            xmlHttp = new ActiveXObject("Msxml2.XMLHTTP"); //按新版IE创建
        } catch (e) {
            try {
                xmlHttp = new ActiveXobject("Microsoft.XMLHttp"); //按老版IE创建
            } catch (e) {
                xmlHttp = false;
                return;
            }
        }
    }

    //处理请求回调
    function callbackFn() {
        if (xmlHttp.readyState == 4) {
            if (xmlHttp.status == 200) {
                option.success(xmlHttp.responseText);
            } else {
                option.error(xmlHttp.responseText, xmlHttp);
            }
        }
    }

    //处理发送参数
    var data = option.data || {},
        paramstr = "";
    // 兼容服务端安全改造新go框架：需要将请求数据封装成json, 导致新旧2套接口传参类型不一（也无法统一）
    try {
        JSON.parse(data)
        paramstr = data
    } catch (error) {
        for (var key in data) {
            if (paramstr) {
                paramstr += "&" + key + "=" + window.encodeURIComponent(data[key]);
            } else {
                paramstr += key + "=" + window.encodeURIComponent(data[key]);
            }
        }
    }
    if (paramstr && (!option.type || option.type.toUpperCase() == "GET")) {
        if (option.url.indexOf("?") != -1) {
            option.url += "&" + paramstr;
        } else {
            option.url += "?" + paramstr;
        }
    }

    //发送请求
    xmlHttp.onreadystatechange = callbackFn;
    xmlHttp.open(option.type, option.url, true);

    // 设置超时
    if (option.timeout) {
        xmlHttp.timeout = option.timeout;
        xmlHttp.ontimeout = function() {
            option.error && option.error('timeout', xmlHttp);
        };
    }

    if (crossdomain) {
        xmlHttp.withCredentials = true;
    }
    // 设置header
    if (data.csrfmiddlewaretoken) {
        xmlHttp.setRequestHeader("X-CSRFToken", data.csrfmiddlewaretoken);
    }
    for (var key in option.headers) {
        xmlHttp.setRequestHeader(key, option.headers[key]);
    }

    var reg = new RegExp("_ku=([^;]*)");
    if (window.ksoAccount && document.cookie.match(reg)) {
        var pathMarch = option.url.match(/https?:\/\/[^/]+(\/[^?]+)/),
            path = (pathMarch && pathMarch[1]) || option.url,
            baseUrl = window.location.protocol + "//" + window.location.host + window.appConfig.rootUrl;

        ksoAccount.signPopToken(option.type, path).then(function (signPopToken) {

            // } else {
            //     option.error(JSON.stringify(error));
            // }
            xmlHttp.send(paramstr);
        })
    } else {

    }

}
